<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.boxicons.com/2.1.4/css/boxicons.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/tabler-icons@1.35.0/iconfont/tabler-icons.min.css" rel="stylesheet"/>

<!-- Basic Icons -->
<link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
<!-- Filled Icons -->
<link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
<!-- Brand Icons -->
<link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">

<link rel="stylesheet" href="code.css">

<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "secondary-fixed-dim": "#4cd7f6",
            "surface-container-highest": "#2d3449",
            "error-container": "#93000a",
            "on-tertiary-fixed": "#191c1e",
            "inverse-surface": "#dae2fd",
            "on-primary-fixed": "#23005c",
            "inverse-on-surface": "#283044",
            "surface-container-low": "#131b2e",
            "on-error-container": "#ffdad6",
            "on-tertiary-container": "#272a2c",
            "on-secondary-fixed": "#001f26",
            "on-background": "#dae2fd",
            "tertiary": "#c4c7c9",
            "on-secondary": "#003640",
            "outline-variant": "#494454",
            "on-surface-variant": "#cbc3d7",
            "on-surface": "#dae2fd",
            "tertiary-fixed": "#e0e3e5",
            "on-primary-fixed-variant": "#5516be",
            "primary": "#d0bcff",
            "secondary-fixed": "#acedff",
            "primary-fixed-dim": "#d0bcff",
            "surface-container-high": "#222a3d",
            "secondary": "#4cd7f6",
            "on-tertiary": "#2d3133",
            "on-primary": "#3c0091",
            "on-primary-container": "#340080",
            "outline": "#958ea0",
            "error": "#ffb4ab",
            "primary-fixed": "#e9ddff",
            "surface": "#0b1326",
            "on-secondary-fixed-variant": "#004e5c",
            "surface-bright": "#31394d",
            "surface-variant": "#2d3449",
            "surface-tint": "#d0bcff",
            "surface-container": "#171f33",
            "on-tertiary-fixed-variant": "#444749",
            "tertiary-fixed-dim": "#c4c7c9",
            "on-secondary-container": "#00424e",
            "primary-container": "#a078ff",
            "secondary-container": "#03b5d3",
            "surface-container-lowest": "#060e20",
            "background": "#0b1326",
            "on-error": "#690005",
            "inverse-primary": "#6d3bd7",
            "surface-dim": "#0b1326",
            "tertiary-container": "#8e9193"
          },
          "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          },
          "fontFamily": {
            "body-md": ["Inter"],
            "headline-lg": ["Space Grotesk"],
            "data-code": ["JetBrains Mono"],
            "label-mono": ["JetBrains Mono"],
            "display-lg": ["Space Grotesk"]
          }
        },
      },
    }
  </script>
</head>
<body class="scroll-custom">
<div class="cyber-bg">
<div class="grid-overlay"></div>
<div class="blob"></div>
<div class="blob blob-2"></div>
</div>
<header class="glass sticky top-0 z-50 px-6 md:px-12 h-20 flex items-center justify-between">
<div class="flex items-center gap-8 w-full max-w-7xl mx-auto">
<div class="logo font-heading text-2xl font-bold tracking-tighter flex items-center gap-2">
<span class="bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary-fixed-dim">Mx wallpaper </span>
</div>
<div class="hidden md:flex flex-1 max-w-xl relative group">
<i class="ti ti-search absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-secondary transition-colors"></i>
<input class="w-full pl-12 pr-4 py-2.5 rounded-full text-sm font-body-md outline-none transition-all" id="searchInput" oninput="filterGallery()" placeholder="Analyze data archives..." type="text"/>
</div>

<div class="max-w-7xl mx-auto px-6 md:px-12 flex gap-8">
<button class="nav-tab active py-4 text-sm font-label-mono uppercase tracking-widest flex items-center gap-2" onclick="switchTab(this,'all')">
<i class="ti ti-apps"></i> Home
    </button>
</div>
</div>

</header>

<main class="max-w-7xl mx-auto px-6 md:px-12 py-8 relative z-10">
<div class="flex flex-wrap items-center justify-between gap-6 mb-10">
<div class="flex items-center gap-6 overflow-x-auto pb-2 scroll-custom">
<span class="text-xs font-label-mono text-outline uppercase tracking-widest">Filter:</span>
<div class="flex gap-2">
<button class="filter-btn active px-4 py-1.5 rounded-sm border border-outline-variant text-xs font-label-mono uppercase hover:border-secondary hover:text-secondary transition-all" onclick="setFilter(this,'all')">All</button>
<button class="filter-btn px-4 py-1.5 rounded-sm border border-outline-variant text-xs font-label-mono uppercase hover:border-secondary hover:text-secondary transition-all" onclick="setFilter(this,'nature')">Nature</button>
<button class="filter-btn px-4 py-1.5 rounded-sm border border-outline-variant text-xs font-label-mono uppercase hover:border-secondary hover:text-secondary transition-all" onclick="setFilter(this,'space')">Space</button>
<button class="filter-btn px-4 py-1.5 rounded-sm border border-outline-variant text-xs font-label-mono uppercase hover:border-secondary hover:text-secondary transition-all" onclick="setFilter(this,'city')">City</button>
<button class="filter-btn px-4 py-1.5 rounded-sm border border-outline-variant text-xs font-label-mono uppercase hover:border-secondary hover:text-secondary transition-all" onclick="setFilter(this,'dark')">Dark</button>
<button class="filter-btn px-4 py-1.5 rounded-sm border border-outline-variant text-xs font-label-mono uppercase hover:border-secondary hover:text-secondary transition-all" onclick="setFilter(this,'technology')">Technology</button>
<button class="filter-btn px-4 py-1.5 rounded-sm border border-outline-variant text-xs font-label-mono uppercase hover:border-secondary hover:text-secondary transition-all" onclick="setFilter(this,'cars')">Cars</button>
<button class="filter-btn px-4 py-1.5 rounded-sm border border-outline-variant text-xs font-label-mono uppercase hover:border-secondary hover:text-secondary transition-all" onclick="setFilter(this,'anime')">Anime</button>
<button class="filter-btn px-4 py-1.5 rounded-sm border border-outline-variant text-xs font-label-mono uppercase hover:border-secondary hover:text-secondary transition-all" onclick="setFilter(this,'sports')">Sports</button>
<button class="filter-btn px-4 py-1.5 rounded-sm border border-outline-variant text-xs font-label-mono uppercase hover:border-secondary hover:text-secondary transition-all" onclick="setFilter(this,'football')">Football</button>
<button class="filter-btn px-4 py-1.5 rounded-sm border border-outline-variant text-xs font-label-mono uppercase hover:border-secondary hover:text-secondary transition-all" onclick="setFilter(this,'others')">Others</button>
</div>
</div>
<div class="flex items-center gap-4">
<div class="h-4 w-px bg-outline-variant/30"></div>
<div class="flex gap-1">
<button class="p-2 text-outline-variant hover:text-secondary" onclick="sortBy('newest')"><i class="ti ti-sort-descending"></i></button>
<button class="p-2 text-secondary" onclick="sortBy('popular')"><i class="ti ti-flame"></i></button>
</div>
</div>
</div>
<div class="flex items-center justify-between mb-8">
<h2 class="font-heading text-xl font-semibold tracking-tight text-on-surface">Data Archives <span class="text-secondary-container text-sm font-mono ml-2 opacity-50" id="totalCountDisplay">[0]</span></h2>
<div class="text-[10px] font-label-mono text-outline-variant uppercase tracking-widest flex gap-4">
<span style="display: none;">Session: <span id="uploadCount">0</span></span>
</div>
</div>
<div class="gallery" id="gallery"></div>
<div class="flex justify-center mt-10">
  <button 
    id="loadMoreBtn"
    onclick="loadMore()"
    class="btn-cyber px-8 py-3 rounded-full text-sm font-bold tracking-wider"
  >
    LOAD MORE
  </button>
</div>
<div class="hidden py-20 text-center" id="emptyState">
<div class="text-secondary opacity-30 text-6xl mb-4"><i class="ti ti-binary"></i></div>
<div class="font-heading text-xl mb-2">No matching sequences found</div>
<div class="text-sm text-outline-variant font-mono">System reboot recommended for different parameters</div>
</div>
</main>
<script src="code.js"></script>
</body></html>
